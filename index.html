<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ST‑Trainer</title>
<meta name="description" content="Übungstrainer">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✏️</text></svg>">
</head>
<body>
<div id="app" aria-live="polite"><noscript>Bitte JavaScript aktivieren.</noscript></div>
<script>
// Fehler sichtbar machen statt weißer Seite (hilft beim Debuggen, v.a. mobil)
window.addEventListener("error", function (e) {
  var app = document.getElementById("app");
  var box = document.createElement("div");
  box.style.cssText = "margin:16px;padding:14px;border:2px solid #b3362b;border-radius:12px;background:#fbe7e4;color:#7a2018;font:14px/1.5 monospace;white-space:pre-wrap;word-break:break-word";
  box.textContent = "Fehler: " + (e.message || e.type) + (e.filename ? "\n" + e.filename.split("/").pop() + ":" + e.lineno : "");
  app.appendChild(box);
});
window.addEventListener("unhandledrejection", function (e) {
  window.dispatchEvent(new ErrorEvent("error", { message: String(e.reason && e.reason.message || e.reason) }));
});
</script>
<script src="js/config.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
